<html lang="en">

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0d1117;
            --bg-panel: #161b22;
            --bg-card: #21262d;
            --border: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --cor-navy: #1e3a5f;
            --cor-blue: #2563eb;
            --accent-gold: #f59e0b;
            --accent-blue: #58a6ff;
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }
        
        #map { 
            height: 100vh; 
            width: 100%; 
        }
        
        .leaflet-control-zoom { display: none; }
        
        /* Main Panel */
        .panel {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 320px;
            max-height: calc(100vh - 32px);
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .panel.collapsed {
            width: auto;
        }
        
        .panel.collapsed .panel-body,
        .panel.collapsed .panel-footer {
            display: none;
        }
        
        .panel-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, var(--cor-navy) 0%, #0f2744 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }
        
        .panel-header:hover {
            background: linear-gradient(135deg, #254a73 0%, #1a3a5c 100%);
        }
        
        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .panel-title h2 {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-primary);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-gold);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.6);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .collapse-btn {
            width: 28px;
            height: 28px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .collapse-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .panel.collapsed .collapse-btn {
            transform: rotate(180deg);
        }
        
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .panel-body::-webkit-scrollbar {
            width: 6px;
        }
        
        .panel-body::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .panel-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 12px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-blue);
        }
        
        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        /* Filter List */
        .filter-section {
            margin-bottom: 8px;
        }
        
        .filter-section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 8px 8px 6px;
        }
        
        .filter-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            margin: 2px 0;
            background: var(--bg-card);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-item:hover {
            background: #2d333b;
            border-color: var(--border);
        }
        
        .filter-item.active {
            border-color: var(--accent-blue);
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.15);
        }
        
        .filter-item.inactive {
            opacity: 0.4;
        }
        
        .filter-item.cor {
            background: linear-gradient(90deg, rgba(30, 58, 95, 0.5) 0%, var(--bg-card) 100%);
            border-color: var(--cor-navy);
            border-width: 2px;
        }
        
        .filter-item.cor.active {
            border-color: var(--accent-gold);
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.2);
        }
        
        .filter-item.cor.inactive {
            opacity: 0.5;
            border-color: transparent;
            background: var(--bg-card);
        }
        
        .filter-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .filter-item.cor .filter-color {
            border: 2px solid var(--accent-gold);
            box-shadow: 0 0 6px rgba(245, 158, 11, 0.5);
        }
        
        .filter-name {
            flex: 1;
            font-size: 13px;
            font-weight: 500;
        }
        
        .filter-item.cor .filter-name {
            color: var(--accent-gold);
            font-weight: 600;
        }
        
        .filter-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-dark);
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .filter-item.active .filter-count {
            background: var(--accent-blue);
            color: var(--bg-dark);
        }
        
        .filter-item.cor.active .filter-count {
            background: var(--accent-gold);
            color: var(--bg-dark);
        }
        
        /* Show All Button */
        .show-all-btn {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .show-all-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }
        
        /* Info Footer */
        .panel-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
            font-size: 10px;
            color: var(--text-muted);
            text-align: center;
        }
        
        /* Custom Markers */
        .cor-marker {
            background: var(--cor-navy);
            border: 3px solid var(--accent-gold);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.5), 0 2px 8px rgba(0,0,0,0.5);
        }
        
        .cor-marker::after {
            content: "★";
            color: var(--accent-gold);
            font-size: 14px;
            text-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        
        /* Popups */
        .leaflet-popup-content-wrapper {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        
        .leaflet-popup-content {
            margin: 0;
            color: var(--text-primary);
        }
        
        .leaflet-popup-tip {
            background: var(--bg-panel);
            border: 1px solid var(--border);
        }
        
        .popup-content {
            min-width: 200px;
        }
        
        .popup-header {
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: 8px 8px 0 0;
            margin: -1px -1px 0 -1px;
            border-bottom: 1px solid var(--border);
        }
        
        .popup-header.cor {
            background: linear-gradient(90deg, var(--cor-navy) 0%, var(--bg-card) 100%);
            border-left: 3px solid var(--accent-gold);
        }
        
        .popup-company {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .popup-header.cor .popup-company {
            color: var(--accent-gold);
        }
        
        .popup-name {
            font-size: 15px;
            font-weight: 600;
        }
        
        .popup-body {
            padding: 12px 16px;
        }
        
        .popup-address {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        
        /* Zoom Controls */
        .zoom-controls {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 1000;
        }
        
        .zoom-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .zoom-btn:hover {
            background: var(--bg-card);
            border-color: var(--accent-blue);
        }
        
        /* Mobile */
        @media (max-width: 640px) {
            .panel {
                top: auto;
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                max-height: 50vh;
                border-radius: 16px 16px 0 0;
            }
            
            .panel.collapsed {
                max-height: auto;
            }
            
            .zoom-controls {
                bottom: auto;
                top: 16px;
                right: 16px;
            }
        }
    </style>
</head>

        ];

        // State
        let activeFilters = new Set(Object.keys(companies));
        const markers = {};
        const markerLayers = {};

        // Create markers for each company
        Object.keys(companies).forEach(company => {
            markerLayers[company] = L.layerGroup();
            markers[company] = [];
        });

        // Add markers
        locations.forEach(loc => {
            const companyData = companies[loc.company];
            if (!companyData) return;
            
            const isCor = loc.company === 'COR Medical Centers';
            
            let icon;
            if (isCor) {
                icon = L.divIcon({
                    className: 'cor-marker-wrapper',
                    html: '<div class="cor-marker"></div>',
                    iconSize: [28, 28],
                    iconAnchor: [14, 14]
                });
            } else {
                icon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="background:${companyData.color};border-radius:50%;width:16px;height:16px;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4);"></div>`,
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });
            }

            const marker = L.marker([loc.lat, loc.lng], {icon: icon});
            
            const popupContent = `
                <div class="popup-content">
                    <div class="popup-header ${isCor ? 'cor' : ''}">
                        <div class="popup-company">${isCor ? '★ ' : ''}${loc.company}</div>
                        <div class="popup-name">${loc.name}</div>
                    </div>
                    <div class="popup-body">
                        <div class="popup-address">${loc.address}</div>
                    </div>
                </div>
            `;
            marker.bindPopup(popupContent, { closeButton: false });
            
            markerLayers[loc.company].addLayer(marker);
            markers[loc.company].push(marker);
        });

        // Add all layers to map
        Object.values(markerLayers).forEach(layer => layer.addTo(map));

        // Build filter list
        function buildFilterList() {
            const filterList = document.getElementById('filter-list');
            filterList.innerHTML = '';
            
            // COR first
            const corCount = markers['COR Medical Centers']?.length || 0;
            const corActive = activeFilters.has('COR Medical Centers');
            filterList.innerHTML += `
                <div class="filter-item cor ${corActive ? 'active' : 'inactive'}" onclick="toggleFilter('COR Medical Centers')">
                    <div class="filter-color" style="background:${companies['COR Medical Centers'].color}"></div>
                    <span class="filter-name">★ COR Medical Centers</span>
                    <span class="filter-count">${corCount}</span>
                </div>
            `;
            
            // Rest sorted by count
            const sorted = Object.keys(companies)
                .filter(c => c !== 'COR Medical Centers')
                .sort((a, b) => (markers[b]?.length || 0) - (markers[a]?.length || 0));
            
            sorted.forEach(company => {
                const count = markers[company]?.length || 0;
                const isActive = activeFilters.has(company);
                filterList.innerHTML += `
                    <div class="filter-item ${isActive ? 'active' : 'inactive'}" onclick="toggleFilter('${company}')">
                        <div class="filter-color" style="background:${companies[company].color}"></div>
                        <span class="filter-name">${company}</span>
                        <span class="filter-count">${count}</span>
                    </div>
                `;
            });
            
            updateStats();
        }

        // Toggle filter
        function toggleFilter(company) {
            if (activeFilters.has(company)) {
                activeFilters.delete(company);
                map.removeLayer(markerLayers[company]);
            } else {
                activeFilters.add(company);
                markerLayers[company].addTo(map);
            }
            buildFilterList();
        }

        // Show all
        function showAll() {
            Object.keys(companies).forEach(company => {
                activeFilters.add(company);
                if (!map.hasLayer(markerLayers[company])) {
                    markerLayers[company].addTo(map);
                }
            });
            buildFilterList();
        }

        // Update stats
        function updateStats() {
            const totalLocs = locations.length;
            const totalEntities = Object.keys(companies).length;
            let visible = 0;
            activeFilters.forEach(company => {
                visible += markers[company]?.length || 0;
            });
            
            document.getElementById('total-locations').textContent = totalLocs;
            document.getElementById('total-entities').textContent = totalEntities;
            document.getElementById('visible-count').textContent = visible;
        }

        // Toggle panel
        function togglePanel() {
            document.getElementById('panel').classList.toggle('collapsed');
        }

        // Initialize
        buildFilterList();
    </script>
